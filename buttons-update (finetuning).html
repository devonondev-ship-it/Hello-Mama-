<style>

.subscribe-button{
  background-color: rgb(201, 23, 23);      
  color: white;                          
  height: 36px;                          
  width: 105px;                          
  border-radius: 3px;                     
  cursor: pointer;                        
  margin: 5px;
  font-size: 14px;
  transition: opacity 0.15s, box-shadow 1s;                    
}

.subscribe-button:hover{
  opacity: 0.7;
  box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.3);  
}

.subscribe-button:active{
  opacity: 0.3;
  transform: translateY(2px);
}


.join-button{ 
  background-color: rgb(255, 255, 255);
  color: rgb(0, 174, 255);
  border-radius: 3px;
  width: 75px;
  height: 40px;
  cursor: pointer;
  font-size: 15px;
  font-weight: bold;
  border: 2px solid rgb(0, 174, 255);
  transition: background-color 0.15s, color 0.15s,box-shadow 1s;
}

.Join-button:hover{
  background-color: rgb(0, 174, 255);
  color: white;
  box-shadow: 0px 5px 10px rgba(0, 0, 0, 1);
}

.join-button:active{
  opacity: 0.4;
  transform: translate(2px);
}

.member-button{
  background-color: rgb(190, 186, 186);
  color: rgb(0, 0, 0);
  border-radius: 19px;
  border: none;
  height: 36px;
  width: 105px;
  cursor: pointer;
  margin-right: 5px;
}

.member-button:hover{
  opacity: 0.7;
}

.member-button:active{
  opacity: 0.3;
  transform: translate(10px, 10px);
}

.like-button{
  padding: 10px;
  border-top-left-radius: 50px;
  border-bottom-left-radius: 50px;
  color: rgb(0, 0, 0);
  background-color: rgb(22, 187, 96);
  border: 1px solid rgb(0, 0, 0);
  margin-right: -2px;
  cursor: pointer;
  box-shadow: 0px 5px 10px rgba(27, 238, 133, 0.3) ;
}

.like-button:hover{
  background-color: rgb(22, 187, 96);
  color: white;
}

.like-button:active{
 transform:translate(10px, 10px);
}

.dislike-button{
  padding: 10px;
  border-top-right-radius: 50px;
  background-color: rgb(243, 91, 91);
  border-bottom-right-radius: 50px;
  border: 2px solid rgb(0, 0, 0);
  margin-left: -3px;
  cursor: pointer;
  border-width: 1px;
}

.dislike-button:hover{
  background-color: rgb(243, 91, 91);
  color: white;
}

.dislike-button:active{
  transform: translate(-10px, -10px);
}
.tweet-button
{
  background-color: rgb(55, 161, 231);
  color: white;
  border-radius: 19px;
  height: 36px;
  width: 75px;
  cursor: pointer;
  border: none;
  font-size: 16px;
  margin: 5px;
}

.tweet-button:hover{
  background-color: rgb(250, 250, 250);
  color: rgb(55, 161, 231);
  box-shadow: 0 5px 10px rgba(55, 161, 231, 2);
}

.tweet-button:active{
  opacity: 0.4;
} 

.signup-button{
  background-color: rgb(22, 187, 96);
  color: white;
  border-radius: 5px;
  height: 40px;
  width: 115px;
  cursor: pointer;
  border: none;
  font-size: 16px;
  margin: 5px;
  transition: opacity 0.15s;
}

.signup-button:hover{
  opacity: 0.7;
}

.signup-button:active{
  opacity: 0.3;
}

.download-button{
  background-color: rgb(255, 255, 255);
  color: rgb(182, 178, 178);
  border-radius: 5px;
  height: 40px;
  width: 115px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  margin: 5px;
  border: 1px solid rgb(182, 178, 178);
}

.download-button:hover{
  background-color: rgb(182, 178, 178);
  color: white;
  border: 1px solid rgb(182, 178, 178);
}

.save-button{
  background-color: rgb(255, 255, 255);
  color: rgb(0, 109, 211);
  border-radius: 20px;
  height: 40px;
  width: 85px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  margin: 5px;
  border: 1px solid rgb(0, 174, 255);
}
.save-button:hover{
  background-color: rgb(0, 109, 211);
  color: white;
  border: 1px solid rgb(0, 109, 211);
}
</style>









<button class="subscribe-button">
